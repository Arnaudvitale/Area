server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/area}
spring.datasource.username=${DB_USERNAME:area}
spring.datasource.password=${DB_PASSWORD:area}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}
google.redirect-uri=${REDIRECT_URI:http://localhost:8080/auth/google/callback}

github.client-id=${GITHUB_CLIENT_ID:}
github.client-secret=${GITHUB_CLIENT_SECRET:}

deezer.app-id=${DEEZER_APP_ID:}
deezer.secret-key=${DEEZER_SECRET_KEY:}
deezer.redirect-uri=${DEEZER_REDIRECT_URI:http://localhost:8080/auth/deezer/callback}

frontend.url=${FRONTEND_URL:http://localhost:8081}
